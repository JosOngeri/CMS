name: Deploy to Staging

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Backend (staging)
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/kmaincms-backend:staging
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/kmaincms-backend:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/kmaincms-backend:buildcache,mode=max
    
    - name: Build and push Frontend (staging)
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/kmaincms-frontend:staging
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/kmaincms-frontend:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/kmaincms-frontend:buildcache,mode=max
    
    - name: Deploy to staging server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.STAGING_SERVER_HOST }}
        username: ${{ secrets.STAGING_SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /opt/kmaincms-staging
          docker-compose pull
          docker-compose up -d
          docker system prune -f
    
    - name: Run tests on staging
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.STAGING_SERVER_HOST }}
        username: ${{ secrets.STAGING_SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /opt/kmaincms-staging
          docker-compose exec -T backend npm test
