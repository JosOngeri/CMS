name: KMainCMS CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: kmaincms_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        npm ci
        npm install --workspace=backend --workspace=frontend
    
    - name: Run infrastructure tests
      run: npm run test:infra
    
    - name: Lint backend
      run: npm run lint --workspace=backend
    
    - name: Lint frontend
      run: npm run lint --workspace=frontend
    
    - name: Run backend tests
      env:
        NODE_ENV: test
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: kmaincms_test
        DB_USER: postgres
        DB_PASSWORD: postgres
      run: npm test --workspace=backend
    
    - name: Build frontend
      run: npm run build
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      if: matrix.node-version == '20.x'
      with:
        files: ./backend/coverage/lcov.info
        flags: backend
        name: backend-coverage
  
  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      run: docker build -t kmaincms:${{ github.sha }} .
    
    - name: Test Docker image
      run: |
        docker run -d -p 5005:5005 \
          -e NODE_ENV=production \
          -e DB_HOST=localhost \
          -e DB_PORT=5432 \
          -e DB_NAME=kmaincms \
          -e DB_USER=postgres \
          -e DB_PASSWORD=postgres \
          kmaincms:${{ github.sha }}
        
        # Wait for server to start
        sleep 10
        
        # Test health endpoint
        curl -f http://localhost:5005/api/health || exit 1
    
    - name: Push to registry (if main branch)
      if: github.ref == 'refs/heads/main'
      run: |
        echo "Push to registry logic here"
        # docker tag kmaincms:${{ github.sha }} registry.example.com/kmaincms:latest
        # docker push registry.example.com/kmaincms:latest
  
  security:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run security audit
      run: |
        npm audit --audit-level=moderate
        npm audit --workspace=backend --audit-level=moderate
        npm audit --workspace=frontend --audit-level=moderate
    
    - name: Run security script
      run: node backend/security_audit.js
