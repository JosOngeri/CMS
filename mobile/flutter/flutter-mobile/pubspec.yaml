name: sda_church_mobile
description: SDA Church Kiserian Main Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Navigation
  cupertino_icons: ^1.0.2
  material_design_icons_flutter: ^7.0.7296
  go_router: ^17.2.3
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.2
  
  # State Management
  provider: ^6.1.1
  flutter_riverpod: ^3.3.1
  riverpod: ^3.2.1
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Authentication
  # 🔒 Secure Storage (upgrade all together)
  flutter_secure_storage: ^10.2.0
  flutter_secure_storage_linux: ^3.0.0
  flutter_secure_storage_macos: ^4.0.0
  flutter_secure_storage_platform_interface: ^2.0.1
  flutter_secure_storage_web: ^2.1.1
  flutter_secure_storage_windows: ^4.2.1
  
  # Forms
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.0.0
  
  # UI Components
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  # 🎨 UI / Animations
  lottie: ^3.3.3
  
  # Utilities
  intl: any
  logger: ^2.0.2+1
  
  # 🔥 Firebase (upgrade together)
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  
  # URL Launcher
  url_launcher: ^6.2.1
  
  # Camera & Image
  image_picker: ^1.0.4
  
  # Biometrics
  # 👤 Local Auth (upgrade all together)
  local_auth: ^3.0.1
  local_auth_android: ^2.0.8
  local_auth_darwin: ^2.0.3
  local_auth_windows: ^2.0.1

  # App Updates
  package_info_plus: ^10.1.0
  open_filex: ^4.0.0
  permission_handler: ^11.0.0
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  # 🧹 Linting
  flutter_lints: ^6.0.0
  lints: ^6.1.0
  # 🎨 App Icons
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/animations/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/app_icon.png"
