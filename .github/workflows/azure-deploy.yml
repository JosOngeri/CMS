name: Build and Deploy to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
# ... rest of file

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build

      - name: Zip artifact for deployment
        # Include backend, root package.json, and the built frontend/dist
        # Exclude node_modules as they will be installed on Azure or we can bundle them.
        # Azure App Service Linux works best if we provide the zip with root package.json.
        run: zip -r release.zip . -x "node_modules/*" "frontend/node_modules/*" "backend/node_modules/*" ".git/*" "archive/*" "mobile/*" "infrastructure/*" "tools/*"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'CMS2App'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip
          slot-name: 'production'
